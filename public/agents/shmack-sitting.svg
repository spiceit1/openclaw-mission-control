<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <!-- Chair -->
  <rect x="15" y="75" width="50" height="8" rx="3" fill="#4a3e28" />
  <rect x="18" y="83" width="6" height="20" rx="2" fill="#3a3020" />
  <rect x="56" y="83" width="6" height="20" rx="2" fill="#3a3020" />
  <rect x="15" y="45" width="50" height="6" rx="3" fill="#4a3e28" />
  <rect x="55" y="45" width="8" height="35" rx="3" fill="#4a3e28" />
  <rect x="17" y="45" width="8" height="35" rx="3" fill="#4a3e28" />
  
  <!-- Body/Shirt - Purple -->
  <rect x="24" y="42" width="32" height="28" rx="6" fill="#7c5cfc" />
  <rect x="24" y="42" width="32" height="28" rx="6" fill="url(#shirtGrad)" opacity="0.3" />
  
  <!-- Arms -->
  <rect x="16" y="46" width="10" height="18" rx="5" fill="#7c5cfc" />
  <rect x="54" y="46" width="10" height="18" rx="5" fill="#7c5cfc" />
  
  <!-- Hands -->
  <circle cx="21" cy="64" r="5" fill="#f5d0b0" />
  <circle cx="59" cy="64" r="5" fill="#f5d0b0" />
  
  <!-- Emoji on shirt -->
  <text x="40" y="60" text-anchor="middle" font-size="14">🤙</text>
  
  <!-- Neck -->
  <rect x="35" y="32" width="10" height="12" rx="3" fill="#f5d0b0" />
  
  <!-- Head -->
  <circle cx="40" cy="24" r="16" fill="#f5d0b0" />
  <circle cx="40" cy="24" r="16" fill="url(#headGrad)" opacity="0.1" />
  
  <!-- Red Hair -->
  <ellipse cx="40" cy="12" rx="16" ry="8" fill="#c0442a" />
  <ellipse cx="40" cy="14" rx="14" ry="4" fill="#d45535" />
  <ellipse cx="30" cy="16" rx="4" ry="6" fill="#c0442a" />
  <ellipse cx="50" cy="16" rx="4" ry="6" fill="#c0442a" />
  
  <!-- Eyes -->
  <ellipse cx="34" cy="24" rx="3" ry="3.5" fill="white" />
  <ellipse cx="46" cy="24" rx="3" ry="3.5" fill="white" />
  <circle cx="35" cy="24" r="2" fill="#2a2a3a" />
  <circle cx="47" cy="24" r="2" fill="#2a2a3a" />
  <circle cx="35.5" cy="23.5" r="0.7" fill="white" />
  <circle cx="47.5" cy="23.5" r="0.7" fill="white" />
  
  <!-- Mouth - smile -->
  <path d="M 35 30 Q 40 35 45 30" stroke="#c4956a" stroke-width="1.5" fill="none" stroke-linecap="round" />
  
  <!-- Legs -->
  <rect x="28" y="68" width="10" height="12" rx="4" fill="#3a3a50" />
  <rect x="42" y="68" width="10" height="12" rx="4" fill="#3a3a50" />
  
  <!-- Shoes -->
  <ellipse cx="33" cy="80" rx="7" ry="4" fill="#2a2a3a" />
  <ellipse cx="47" cy="80" rx="7" ry="4" fill="#2a2a3a" />
  
  <defs>
    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
  </defs>
</svg>