<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 140" width="160" height="140">
  <defs>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3545"/>
      <stop offset="100%" stop-color="#2a2535"/>
    </linearGradient>
    <linearGradient id="chairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4555"/>
      <stop offset="100%" stop-color="#3a3545"/>
    </linearGradient>
    <linearGradient id="monitorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#1a1a2a"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3050"/>
      <stop offset="100%" stop-color="#102040"/>
    </linearGradient>
  </defs>

  <!-- Chair back -->
  <rect x="48" y="38" width="64" height="50" rx="8" fill="url(#chairGrad)" stroke="#5a5565" stroke-width="1"/>
  <rect x="52" y="42" width="56" height="42" rx="6" fill="#3a3545" stroke="#4a4555" stroke-width="0.5"/>
  
  <!-- Chair seat -->
  <rect x="44" y="88" width="72" height="10" rx="4" fill="url(#chairGrad)" stroke="#5a5565" stroke-width="1"/>
  
  <!-- Chair base -->
  <rect x="74" y="98" width="12" height="14" rx="2" fill="#4a4555"/>
  <!-- Chair wheels -->
  <circle cx="54" cy="116" r="5" fill="#3a3545" stroke="#4a4555" stroke-width="1"/>
  <circle cx="106" cy="116" r="5" fill="#3a3545" stroke="#4a4555" stroke-width="1"/>
  <rect x="49" y="112" width="62" height="4" rx="2" fill="#4a4555"/>

  <!-- Desk surface -->
  <rect x="8" y="100" width="144" height="12" rx="3" fill="url(#deskGrad)" stroke="#4a4555" stroke-width="1"/>
  <!-- Desk front panel -->
  <rect x="12" y="112" width="136" height="22" rx="2" fill="#2a2535" stroke="#3a3545" stroke-width="1"/>
  <!-- Desk legs -->
  <rect x="16" y="134" width="8" height="6" rx="1" fill="#3a3545"/>
  <rect x="136" y="134" width="8" height="6" rx="1" fill="#3a3545"/>

  <!-- Monitor -->
  <rect x="54" y="68" width="52" height="34" rx="3" fill="url(#monitorGrad)" stroke="#4a4a5a" stroke-width="1.5"/>
  <rect x="57" y="71" width="46" height="27" rx="2" fill="url(#screenGrad)"/>
  <!-- Screen glow lines -->
  <rect x="61" y="76" width="20" height="2" rx="1" fill="#3a6a9a" opacity="0.6"/>
  <rect x="61" y="81" width="30" height="2" rx="1" fill="#3a6a9a" opacity="0.4"/>
  <rect x="61" y="86" width="15" height="2" rx="1" fill="#4a8aba" opacity="0.3"/>
  <!-- Monitor stand -->
  <rect x="74" y="100" width="12" height="4" rx="1" fill="#3a3a4a"/>
</svg>